name: Build FlashTrack APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle cache ──────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Gradle permissions ────────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. Build Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false"

      # ── 6. Build Release APK (unsigned) ─────────────────────────────────────
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false"

      # ── 7. Sign Release APK (optional — needs secrets) ──────────────────────
      # Uncomment this step after adding your keystore to GitHub Secrets
      # - name: Sign Release APK
      #   uses: r0adkll/sign-android-release@v1
      #   with:
      #     releaseDirectory: app/build/outputs/apk/release
      #     signingKeyBase64: ${{ secrets.SIGNING_KEY }}
      #     alias: ${{ secrets.SIGNING_KEY_ALIAS }}
      #     keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
      #     keyPassword: ${{ secrets.KEY_PASSWORD }}

      # ── 8. Rename APKs with version + commit sha ─────────────────────────────
      - name: Rename APKs
        run: |
          mkdir -p artifacts
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/FlashTrack-debug-${SHORT_SHA}.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             artifacts/FlashTrack-release-unsigned-${SHORT_SHA}.apk
          echo "APKs renamed:"
          ls -lh artifacts/

      # ── 9. Upload Debug APK artifact ─────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FlashTrack-Debug-APK
          path: artifacts/FlashTrack-debug-*.apk
          retention-days: 30

      # ── 10. Upload Release APK artifact ──────────────────────────────────────
      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: FlashTrack-Release-APK
          path: artifacts/FlashTrack-release-unsigned-*.apk
          retention-days: 30

      # ── 11. Build summary ────────────────────────────────────────────────────
      - name: Print build summary
        run: |
          echo "### ✅ Build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| APK | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          for f in artifacts/*.apk; do
            SIZE=$(du -sh "$f" | cut -f1)
            NAME=$(basename "$f")
            echo "| $NAME | $SIZE |" >> $GITHUB_STEP_SUMMARY
          done

  # ── Optional: create a GitHub Release on version tags ──────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')   # only runs on tags like v1.0.0

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FlashTrack ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: release-artifacts/**/*.apk
          body: |
            ## FlashTrack ${{ github.ref_name }}

            ### Download
            - **Debug APK** — for testing, no signing required
            - **Release APK (unsigned)** — sign with your keystore before distributing

            ### What's new
            See commit history for changes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
